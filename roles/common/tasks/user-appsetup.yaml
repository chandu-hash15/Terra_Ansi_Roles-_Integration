- name: creating system user roboshop
  ansible.builtin.user:
    name: roboshop
    system: true
    shell: /sbin/nologin
    home: /app

- name: deleting existing app directory
  ansible.builtin.file:
    path: /app
    state: absent

- name: creating app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: cleaning up the existing files
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent

- name: downloading the source code
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
    dest: /tmp/{{ component }}.zip

- name: unzip {{ component }} app
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes